name: Release

# Publishes the package to npm on tag push (e.g., `git tag v0.1.0 && git push --tags`).
# Also exposes a workflow_dispatch trigger for manual publication from main.
#
# Auth: npm trusted publishing via OIDC. No long-lived NPM_TOKEN required.
# One-time setup on npm: Settings → Trusted Publishers → Add publisher
#   - Publisher: GitHub Actions
#   - Organization: williamzujkowski
#   - Repository: nexus-eval-atbench
#   - Workflow filename: release.yml
# After that, `id-token: write` + `npm publish --provenance` authenticates
# via the workflow's OIDC token and signs the artifact via Sigstore.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC auth to npm + Sigstore provenance signing

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing requires npm >= 11.5.1. setup-node@v4 ships
      # an older npm (10.x), so we upgrade explicitly. Without this, `npm
      # publish --provenance` from CI returns E404 because npm 10 sends an
      # unauthenticated PUT (no OIDC negotiation with the registry).
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
