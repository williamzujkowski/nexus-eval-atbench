name: Release

# Publishes the package to npm on tag push (e.g., `git tag v0.2.0 && git push --tags`).
# Also exposes a workflow_dispatch trigger for manual publication from main.
#
# Required secret: NPM_TOKEN — an npm automation token with publish access to
# the `nexus-eval-atbench` package.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
